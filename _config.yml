title: Beyond Proof
description: Journeys in Learning and Complexity
author: MIStatlE
url: https://MIStatlE.github.io
baseurl: ""
theme: minima

# 顶部导航
header_pages:
  - about.md
  - courses/index.md
  - articles/index.md
  - tags/index.md

# Minima 主题定制
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/yourname" }
  date_format: "%Y-%m-%d"

# GitHub Pages 白名单插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Markdown & 数学
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax

# 集合：posts（博客短帖）、articles（个人文章）、courses（课程页）
collections:
  posts:
    output: true
  articles:
    output: true
    permalink: /articles/:title/
  courses:
    output: true
    permalink: /courses/:title/

# 默认布局（减少每篇文件的样板）
defaults:
  - scope: { path: "", type: "posts" }
    values: { layout: post }
  - scope: { path: "", type: "articles" }
    values: { layout: post }     # 用同一套排版（学术风）
  - scope: { path: "", type: "courses" }
    values: { layout: page }     # 课程页更像文档/主页

# （可选）分页先不开
# paginate: 10
# paginate_path: "/page:num"
