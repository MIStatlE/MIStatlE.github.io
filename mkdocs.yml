site_name: Learning Theory Atlas｜数学与机器学习理论自学指南
site_description: 数学与机器学习理论的学习路径与资源库
site_author: MIStatlE
site_url: https://mistatle.github.io

# 删除 GitHub 链接相关配置
repo_url: ''
repo_name: ''
edit_uri: ''

strict: false
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking     # 可选：滚动时在侧栏高亮当前位置
    # - navigation.expand     # 不要：默认全展开
    # - navigation.sections   # 不要：分组变标题，不可折叠
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切到夜间
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切到日间

markdown_extensions:
  - attr_list
  - admonition
  - footnotes
  - def_list
  - meta
  - nl2br
  - toc:
      permalink: '#'
  - pymdownx.highlight:
      anchor_linenums: false
      linenums: false
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist
  - pymdownx.tilde
  - pymdownx.tabbed

plugins:
  - search:
      lang: zh
      separator: '[\\s\\-，。,.、；;！？!?\\u3000]+'

nav:
  - 自我介绍: zh/preface.md
  - 本书使用指南: zh/how-to-use.md

  - 课程资源与笔记:
      - CS 学习规划: zh/plan.md
      - 必学工具: zh/tools.md
      - 好书推荐: zh/books.md
      - 数学基础: zh/math-basic.md
      - 数学进阶: zh/math-advanced.md
      - 编程入门: zh/programming-basic.md
      - 数据结构与算法: zh/data-algorithm.md
      - 电子基础: zh/electronics.md
      - 软件工程: zh/software-engineering.md
      - 计算机系统: zh/computer-systems.md

  - 论文精选与笔记: zh/industry.md   # 目前用行业动态与前沿的文件占位

  - 心智成长: zh/growth.md

  - 联系我与社群建立: zh/community.md

  - 资源库与工具:
      - 笔记资源: zh/resources.md
      - 媒体内容: zh/media.md
      - 职业发展与求职指导: zh/career.md
