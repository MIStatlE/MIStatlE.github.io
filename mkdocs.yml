site_name: 数学与机器学习自学指南
site_description: 个人自学数学、机器学习、算法与人工智能的资源与笔记
site_author: MIStatlE
site_url: https://mistatle.github.io
repo_url: https://github.com/MIStatlE/MIStatlE.github.io
repo_name: MIStatlE/MIStatlE.github.io
edit_uri: edit/main/docs/

# 在本配置中启用宽松模式并保留目录式 URL
strict: false
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.expand
    - navigation.tabs
    - toc.integrate
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: teal
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切到夜间
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切到日间

markdown_extensions:
  - attr_list
  - admonition
  - footnotes
  - def_list
  - meta
  - nl2br
  - toc:
      permalink: '#'
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.highlight:
      anchor_linenums: false
      linenums: false
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist
  - pymdownx.tilde

plugins:
  - search:
      lang: zh
      separator: '[\s\-，。,.、；;！？!?\u3000]+'

# 网站导航结构
nav:
  - 首页: index.md
  - 推荐资源: resources/index.md
  - 学习笔记:
      - 数学基础: notes/math.md
      - 机器学习: notes/ml.md
      - 算法设计: notes/algorithm.md
      - 人工智能: notes/ai.md
  - 工具与信息:
      - 工具使用方法: tools.md
      - 信息源: sources.md
  - 我的文章: articles/index.md
  - 心得感悟: reflections.md