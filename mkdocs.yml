site_name: 成长空间
site_description: 自学计算机科学、数学与个人成长的资源与成长平台
site_author: MIStatlE
site_url: https://mistatle.github.io

# 删除 GitHub 链接相关配置
repo_url: ''
repo_name: ''
edit_uri: ''

strict: false
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.expand
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切到夜间
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切到日间

markdown_extensions:
  - attr_list
  - admonition
  - footnotes
  - def_list
  - meta
  - nl2br
  - toc:
      permalink: '#'
  - pymdownx.highlight:
      anchor_linenums: false
      linenums: false
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist
  - pymdownx.tilde
  - pymdownx.tabbed

plugins:
  - search:
      lang: zh
      separator: '[\\s\\-，。,.、；;！？!?\\u3000]+'

nav:
  - 首页: zh/index.md
  - 前言: zh/preface.md
  - 如何使用这本书: zh/how-to-use.md
  - CS学习规划: zh/plan.md
  - 必学工具: zh/tools.md
  - 好书推荐: zh/books.md
  - 资源库与工具: zh/resources.md
  - 职业发展与求职指导: zh/career.md
  - 行业动态与前沿分享: zh/industry.md
  - 数学基础: zh/math-basic.md
  - 数学进阶: zh/math-advanced.md
  - 编程入门: zh/programming-basic.md
  - 电子基础: zh/electronics.md
  - 数据结构与算法: zh/data-algorithm.md
  - 软件工程: zh/software-engineering.md
  - 计算机系统基础: zh/computer-systems.md
  - 心智成长: zh/growth.md
  - 社群建立: zh/community.md
  - 媒体内容: zh/media.md