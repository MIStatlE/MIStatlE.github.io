## 第 2 步：新建 `assets/landing-head.html`

在 `assets/` 目录里新建：`landing-head.html`，内容：

```html
<!-- assets/landing-head.html -->

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- 使用 Inter 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

<style>
    :root {
        --primary-blue: #00e0ff; /* Electric Cyan */
        --dark-bg: #0A0A1F; /* Very Dark Navy */
    }
    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--dark-bg);
        color: #E0E7FF; /* Light Lavender Text */
        scroll-behavior: smooth;
        min-height: 100vh;
        position: relative; /* Context for canvas */
    }

    /* 动态背景 Canvas 样式 */
    #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1; /* Send it behind all content */
        pointer-events: none; /* Make it unclickable */
        opacity: 0.5; /* Subtle effect */
    }

    /* 霓虹按钮效果 */
    .neon-button {
        transition: all 0.3s ease;
        box-shadow: 0 0 5px var(--primary-blue), 0 0 10px var(--primary-blue);
    }
    .neon-button:hover {
        box-shadow: 0 0 15px var(--primary-blue), 0 0 30px var(--primary-blue);
        background-color: rgba(0, 224, 255, 0.1);
    }

    /* 核心区划线效果：模拟数据流光 */
    .section-divider {
        height: 2px;
        width: 50%;
        background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
        margin: 4rem auto 4rem auto;
        opacity: 0.3;
    }

    /* 卡片悬停效果 */
    .card-hover {
        transition: all 0.3s ease;
        transform: translateY(0);
    }
    .card-hover:hover {
        background-color: #1a1a3a;
        transform: translateY(-4px);
        border-color: #00e0ff;
    }
</style>
