<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/lucide.min.js"></script>

<!-- particles.js -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
body {
    background: linear-gradient(160deg, #1e3a8a, #312e81, #1e293b);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
}

  #particles-js {
      position: absolute;
      width: 100%; height: 100%;
      top: 0; left: 0;
      z-index: 0;
  }

  .content-wrapper {
      position: relative;
      z-index: 10;
  }

  h2 { position: relative; display: inline-block; }
  h2::after {
      content: '';
      position: absolute;
      left: 0; bottom: -8px;
      height: 3px; width: 50%;
      background: linear-gradient(90deg, #0ea5e9, #6366f1);
      transition: width .3s;
  }
  h2:hover::after { width: 100%; }

  @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
  }

  .animate-fade-in { animation: fadeIn 1s ease forwards; }
  .animate-fade-in-delay-1 { animation: fadeIn 1s ease .3s forwards; opacity: 0; }
  .animate-fade-in-delay-2 { animation: fadeIn 1s ease .6s forwards; opacity: 0; }
</style>
